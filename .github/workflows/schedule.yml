name: Consulta Multas Monterrey

on:
  # Roda automaticamente todo dia às 10h (horário de Brasília = 21h UTC)
  schedule:
    - cron: "0 12 * * *"

  # Permite rodar manualmente pelo GitHub com um clique
  workflow_dispatch:

jobs:
  consultar-multas:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests google-cloud-bigquery

      - name: Rodar script de consulta de multas
        env:
          MOTTU_USERNAME: ${{ secrets.MOTTU_USERNAME }}
          MOTTU_PASSWORD: ${{ secrets.MOTTU_PASSWORD }}
          PIPEFY_TOKEN:   ${{ secrets.PIPEFY_TOKEN }}
        run: python motos_regiao_monterrey.py
